<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>
            Rock-Paper-Scissors 
        </h1>
    </header>

    <h2>
        Choose Your Fighter!
    </h2>

    <div class="choices">
        <div id="topBtn">
            <button class="choiceBtn" onclick="playGame('rock')">🪨</button>
        </div>
        <div id="bottomBtns">
            <button class="choiceBtn" onclick="playGame('paper')">📄</button>
            <button class="choiceBtn" onclick="playGame('scissors')">✂️</button>
        </div>  
    </div>
    
    <div id="playerDisplay">PLAYER: </div>
    <div id="computerDisplay">COMPUTER: </div>
    <div id="resultDisplay"></div>

    <div class="scoreDisplay">Player Score:
        <span id="playerScoreDisplay">0</span>
    </div>
   
    <div class="scoreDisplay">Computer Score:
        <span id="computerScoreDisplay">0</span>
    </div>

    <footer>
        Image made with <a href="https://firefly.adobe.com/">Adobe Firefly</a>
        My <a href="https://github.com/YapTrapp/">Github</a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
