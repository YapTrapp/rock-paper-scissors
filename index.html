<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <!--Google Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>
            Rock-Paper-Scissors 
        </h1>
    </header>

    <h2>
        Choose Your Fighter!
    </h2>

    <div class="choices">
        <div id="topBtn">
            <button class="choiceBtn" id="rock">🪨</button>
        </div>
        <div id="bottomBtns">
            <button class="choiceBtn" id="paper">📄</button>
            <button class="choiceBtn" id="scissors">✂️</button>
        </div>  
    </div>
    
    <div id="playerDisplay">PLAYER: </div>
    <div id="computerDisplay">COMPUTER: </div>
    <div id="resultDisplay"></div>

    <div class="scoreDisplay">Player Score:
        <span id="playerScoreDisplay">0</span>
    </div>
   
    <div class="scoreDisplay">Computer Score:
        <span id="computerScoreDisplay">0</span>
    </div>

    <footer>
        Image made with <a href="https://firefly.adobe.com/">Adobe Firefly</a>
        My <a href="https://github.com/YapTrapp/">Github</a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
